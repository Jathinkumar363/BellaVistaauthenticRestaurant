<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laundry Service</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: #2c3e50;
      color: white;
    }

    nav .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav ul li {
      cursor: pointer;
      transition: color 0.3s;
    }

    nav ul li:hover {
      color: #1abc9c;
    }

    nav .user {
      font-weight: bold;
    }

    /* Hero Section */
    .hero {
      display: flex;
      height: 100vh; /* Full viewport height */
      background: #ecf0f1;
    }

    .hero-left, .hero-right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .hero-left {
      flex-direction: column;
      text-align: left;
    }

    .hero-left h1 {
      font-size: 3rem;
      color: #2c3e50;
      margin-bottom: 1rem;
    }

    .hero-left p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #34495e;
    }

    .hero-left button {
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      background-color: #1abc9c;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    .hero-left button:hover {
      background-color: #16a085;
    }

    .hero-right img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="logo">LaundryPro</div>
    <ul>
      <li>Home</li>
      <li>Services</li>
      <li>About Us</li>
      <li>Contact Us</li>
    </ul>
    <div class="user">Hello, Jathin</div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <!-- Left Div -->
    <div class="hero-left">
      <h1>Fresh Clothes, Fresh Start</h1>
      <p>We provide fast, reliable, and affordable laundry services right at your doorstep. Experience convenience like never before.</p>
      <button>Book a Service Today</button>
    </div>

    <!-- Right Div -->
    <div class="hero-right">
      <img src="https://images.unsplash.com/photo-1581579185169-8a1d3f5c2f3a" alt="Laundry Service">
    </div>
  </section>
</body>
</html>
